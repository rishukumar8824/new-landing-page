<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="bitegit_flutter_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>bitegit_flutter_app</title>
  <link rel="manifest" href="manifest.json">
  <style>
    #apk-banner {
      position: fixed;
      right: 12px;
      bottom: 12px;
      z-index: 9999;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 12px;
      background: rgba(5, 10, 20, 0.92);
      border: 1px solid #263753;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #d7e4ff;
    }

    #apk-banner span {
      font-size: 12px;
      line-height: 1;
      white-space: nowrap;
    }

    #apk-banner a {
      text-decoration: none;
      font-size: 12px;
      font-weight: 700;
      color: #02050b;
      background: #9dfb3b;
      border-radius: 9px;
      padding: 6px 10px;
      white-space: nowrap;
    }

    @media (max-width: 640px) {
      #apk-banner {
        right: 8px;
        left: 8px;
        bottom: 8px;
        justify-content: space-between;
      }
    }
  </style>
</head>
<body>
  <div id="apk-banner">
    <span>Bitegit Android App</span>
    <a href="downloads/bitegit-android.apk" download="bitegit-android.apk">Download APK</a>
  </div>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
