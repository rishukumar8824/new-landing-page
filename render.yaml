services:
  - type: web
    name: bitegit-exchange-api
    env: node
    plan: free
    branch: main
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 5000
      - key: ALLOW_DEV_OTP
        value: true
  - type: static_site
    name: bitegit-exchange-web
    rootDir: bitegit_flutter_app
    branch: main
    buildCommand: bash ./scripts/render-build.sh
    publishDir: build/web
    envVars:
      - key: BITEGIT_API_BASE
        value: https://new-landing-page-rlv6.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
