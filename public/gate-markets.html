<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Markets — Bitegit</title>
  <script src="/bitegit-config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0b0e11; --bg2: #131722; --surface: #1c2333;
      --border: rgba(255,255,255,0.08); --text: #eaecef; --muted: #848e9c;
      --accent: #f0b90b; --accent-hover: #d4a109; --green: #0ecb81; --red: #f6465d;
      --radius: 8px;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    a { text-decoration: none; color: inherit; }
    .hidden { display: none !important; }

    /* NAV */
    .nav { position: sticky; top: 0; z-index: 100; background: rgba(11,14,17,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); height: 64px; display: flex; align-items: center; padding: 0 24px; gap: 0; }
    .nav-brand { font-size: 22px; font-weight: 800; color: var(--accent); letter-spacing: -0.5px; margin-right: 40px; }
    .nav-links { display: flex; align-items: center; gap: 4px; flex: 1; }
    .nav-links a { padding: 8px 14px; border-radius: var(--radius); font-size: 14px; font-weight: 500; color: var(--muted); transition: color 0.2s, background 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--text); background: rgba(255,255,255,0.05); }
    .nav-right { display: flex; align-items: center; gap: 10px; margin-left: auto; }
    .nav-btn { padding: 8px 18px; border-radius: var(--radius); font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; }
    .nav-btn.ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .nav-btn.ghost:hover { border-color: var(--accent); color: var(--accent); }
    .nav-btn.primary { background: var(--accent); color: #000; }
    .nav-btn.primary:hover { background: var(--accent-hover); }
    .nav-user { display: flex; align-items: center; gap: 8px; font-size: 14px; }
    .nav-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); color: #000; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; }
    .hamburger { display: none; background: none; border: none; color: var(--text); font-size: 22px; cursor: pointer; }

    /* MAIN */
    .main { max-width: 1280px; margin: 0 auto; padding: 32px 24px; }

    /* SEARCH + FILTER */
    .top-bar { display: flex; gap: 12px; align-items: center; margin-bottom: 24px; flex-wrap: wrap; }
    .search-box { position: relative; flex: 1; min-width: 200px; max-width: 360px; }
    .search-box input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 16px 10px 40px; color: var(--text); font-size: 14px; outline: none; font-family: inherit; }
    .search-box input::placeholder { color: var(--muted); }
    .search-box input:focus { border-color: var(--accent); }
    .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; }
    .tab-group { display: flex; gap: 4px; background: var(--surface); border-radius: var(--radius); padding: 4px; }
    .tab-btn { padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; border: none; background: none; transition: all 0.2s; white-space: nowrap; }
    .tab-btn.active { background: var(--accent); color: #000; }
    .live-dot { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--green); font-weight: 600; margin-left: auto; }
    .live-dot::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }

    /* TABLE */
    .table-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead th { padding: 14px 20px; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); text-align: left; cursor: pointer; user-select: none; white-space: nowrap; }
    thead th:hover { color: var(--text); }
    thead th.sort-asc::after { content: ' ↑'; color: var(--accent); }
    thead th.sort-desc::after { content: ' ↓'; color: var(--accent); }
    thead th:nth-child(n+3), tbody td:nth-child(n+3) { text-align: right; }
    tbody tr { border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.03); }
    tbody td { padding: 14px 20px; font-size: 14px; }
    .coin-cell { display: flex; align-items: center; gap: 12px; }
    .coin-icon { width: 40px; height: 40px; border-radius: 50%; background: rgba(240,185,11,0.1); display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; color: var(--accent); overflow: hidden; flex-shrink: 0; }
    .coin-icon img { width: 100%; height: 100%; object-fit: cover; }
    .coin-name { font-weight: 600; font-size: 15px; }
    .coin-sym { font-size: 12px; color: var(--muted); }
    .chg { display: inline-flex; padding: 4px 10px; border-radius: 4px; font-size: 13px; font-weight: 600; }
    .chg.up { background: rgba(14,203,129,0.12); color: var(--green); }
    .chg.dn { background: rgba(246,70,93,0.12); color: var(--red); }
    .trade-btn { padding: 7px 18px; border-radius: 6px; font-size: 13px; font-weight: 700; background: var(--accent); color: #000; border: none; cursor: pointer; transition: background 0.2s; }
    .trade-btn:hover { background: var(--accent-hover); }
    .empty-row td { text-align: center; padding: 60px; color: var(--muted); }

    /* PAGINATION */
    .pagination { display: flex; justify-content: flex-end; align-items: center; gap: 8px; margin-top: 20px; flex-wrap: wrap; }
    .page-info { font-size: 13px; color: var(--muted); margin-right: auto; }
    .pg-btn { padding: 8px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); font-size: 13px; cursor: pointer; font-family: inherit; transition: all 0.2s; }
    .pg-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .pg-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }
    .pg-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* MOBILE */
    @media (max-width: 900px) { .nav-links, .nav-right { display: none; } .hamburger { display: block; margin-left: auto; } }
    @media (max-width: 700px) {
      thead th:nth-child(5), tbody td:nth-child(5),
      thead th:nth-child(4), tbody td:nth-child(4) { display: none; }
    }
    @media (max-width: 500px) {
      thead th:nth-child(3), tbody td:nth-child(3) { display: none; }
    }
  </style>
</head>
<body>
<nav class="nav">
  <a class="nav-brand" href="/gate-home.html">BITEGIT</a>
  <div class="nav-links">
    <a href="/gate-markets.html" class="active">Markets</a>
    <a href="/gate-trade.html">Trade</a>
    <a href="/gate-home.html#features">Features</a>
  </div>
  <div class="nav-right" id="navAuth">
    <a href="/login.html"><button class="nav-btn ghost">Log In</button></a>
    <a href="/signup.html"><button class="nav-btn primary">Sign Up</button></a>
  </div>
  <div class="nav-right nav-user hidden" id="navUser">
    <div class="nav-avatar" id="navAvatar">U</div>
    <span id="navEmail">User</span>
    <button class="nav-btn ghost" id="navLogout">Logout</button>
  </div>
  <button class="hamburger" id="hamburger">☰</button>
</nav>

<main class="main">
  <h1 style="font-size:28px;font-weight:800;margin-bottom:24px;">Crypto Markets</h1>

  <div class="top-bar">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search coin or symbol…" />
    </div>
    <div class="tab-group">
      <button class="tab-btn active" data-tab="all">All</button>
      <button class="tab-btn" data-tab="gainer">Gainers</button>
      <button class="tab-btn" data-tab="loser">Losers</button>
      <button class="tab-btn" data-tab="vol">Volume</button>
    </div>
    <span class="live-dot">Live</span>
  </div>

  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th data-sort="name">Asset</th>
          <th data-sort="price">Price</th>
          <th data-sort="change">24h Change</th>
          <th data-sort="volume">24h Volume</th>
          <th data-sort="high">24h High</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="7" style="text-align:center;padding:60px;color:var(--muted)">Loading markets…</td></tr>
      </tbody>
    </table>
  </div>

  <div class="pagination">
    <span class="page-info" id="pageInfo">—</span>
    <button class="pg-btn" id="prevBtn" disabled>← Prev</button>
    <span id="pageButtons"></span>
    <button class="pg-btn" id="nextBtn" disabled>Next →</button>
  </div>
</main>

<script>
(function () {
  const API = (window.BITEGIT_API_BASE || 'http://localhost:3000/api/v1');
  const ICONS = { BTC:'₿', ETH:'◆', BNB:'⬢', SOL:'◎', XRP:'✕', ADA:'◉', DOGE:'Ð', AVAX:'A', LINK:'🔗', LTC:'Ł' };
  const ICON_CODES = { BTC:'btc', ETH:'eth', BNB:'bnb', SOL:'sol', XRP:'xrp', ADA:'ada', DOGE:'doge', AVAX:'avax', LINK:'link', LTC:'ltc' };
  const NAMES = { BTC:'Bitcoin', ETH:'Ethereum', BNB:'BNB', SOL:'Solana', XRP:'XRP', ADA:'Cardano', DOGE:'Dogecoin', AVAX:'Avalanche', LINK:'Chainlink', LTC:'Litecoin' };
  const SYMBOLS = ['BTCUSDT','ETHUSDT','BNBUSDT','SOLUSDT','XRPUSDT','ADAUSDT','DOGEUSDT','AVAXUSDT','LINKUSDT','LTCUSDT'];
  const PAGE_SIZE = 10;
  let allData = [], filtered = [], currentPage = 1, currentTab = 'all', sortKey = '', sortDir = 1;
  const token = () => localStorage.getItem('bitegit_token') || '';

  function apiFetch(path) {
    const h = { 'Content-Type': 'application/json' };
    if (token()) h['Authorization'] = 'Bearer ' + token();
    return fetch(API + path, { headers: h, credentials: 'include' });
  }

  function fmt(v, d) { return Number(v || 0).toLocaleString(undefined, { maximumFractionDigits: d ?? 5 }); }
  function fmtVol(v) { v = Number(v||0); return v >= 1e9 ? (v/1e9).toFixed(2)+'B' : v >= 1e6 ? (v/1e6).toFixed(2)+'M' : v >= 1e3 ? (v/1e3).toFixed(1)+'K' : fmt(v,0); }

  function coinIcon(base) {
    const code = ICON_CODES[base];
    if (!code) return `<div class="coin-icon">${ICONS[base] || base[0]}</div>`;
    return `<div class="coin-icon"><img src="https://assets.coincap.io/assets/icons/${code}@2x.png" onerror="this.style.display='none'" />${ICONS[base] || base[0]}</div>`;
  }

  async function loadUser() {
    try {
      const r = await apiFetch('/auth/me');
      const d = await r.json();
      const u = r.ok && (d.success || d.user) ? d.user : null;
      if (u) {
        document.getElementById('navAuth').classList.add('hidden');
        document.getElementById('navUser').classList.remove('hidden');
        const email = u.email || '';
        document.getElementById('navEmail').textContent = email.split('@')[0];
        document.getElementById('navAvatar').textContent = (email[0]||'U').toUpperCase();
      }
    } catch(_) {}
  }

  document.getElementById('navLogout')?.addEventListener('click', async () => {
    try { await apiFetch('/auth/logout'); } catch(_) {}
    localStorage.removeItem('bitegit_token');
    localStorage.removeItem('bitegit_refresh_token');
    location.reload();
  });

  async function loadMarkets() {
    try {
      const params = new URLSearchParams({ symbols: SYMBOLS.join(',') });
      const r = await apiFetch('/market/tickers?' + params);
      const d = await r.json();
      if (r.ok && Array.isArray(d.ticker)) {
        allData = d.ticker;
        applyFilters();
      }
    } catch(_) {}
  }

  function applyFilters() {
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    let data = [...allData];
    if (q) data = data.filter(t => t.symbol.toLowerCase().includes(q) || (t.symbol.replace('USDT','')).toLowerCase().startsWith(q));
    if (currentTab === 'gainer') data = data.filter(t => Number(t.change24h||0) > 0).sort((a,b) => Number(b.change24h||0) - Number(a.change24h||0));
    else if (currentTab === 'loser') data = data.filter(t => Number(t.change24h||0) < 0).sort((a,b) => Number(a.change24h||0) - Number(b.change24h||0));
    else if (currentTab === 'vol') data = data.sort((a,b) => Number(b.volume24h||0) - Number(a.volume24h||0));
    if (sortKey) {
      data.sort((a,b) => {
        let av, bv;
        if (sortKey==='name') { av = a.symbol; bv = b.symbol; return sortDir * av.localeCompare(bv); }
        if (sortKey==='price') { av = Number(a.lastPrice||0); bv = Number(b.lastPrice||0); }
        if (sortKey==='change') { av = Number(a.change24h||0); bv = Number(b.change24h||0); }
        if (sortKey==='volume') { av = Number(a.volume24h||0); bv = Number(b.volume24h||0); }
        if (sortKey==='high') { av = Number(a.high24h||0); bv = Number(b.high24h||0); }
        return sortDir * (av - bv);
      });
    }
    filtered = data;
    currentPage = 1;
    renderTable();
    renderPagination();
  }

  function renderTable() {
    const tbody = document.getElementById('tableBody');
    const start = (currentPage - 1) * PAGE_SIZE;
    const page = filtered.slice(start, start + PAGE_SIZE);
    if (!page.length) { tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:60px;color:var(--muted)">No results found</td></tr>'; return; }
    tbody.innerHTML = page.map((t, i) => {
      const base = t.symbol.replace('USDT','');
      const chg = Number(t.change24h || 0);
      return `<tr onclick="window.location='/gate-trade.html?symbol=${t.symbol}'">
        <td style="color:var(--muted);font-size:13px">${start+i+1}</td>
        <td><div class="coin-cell">${coinIcon(base)}<div><div class="coin-name">${NAMES[base]||base}</div><div class="coin-sym">${base}/USDT</div></div></div></td>
        <td><strong>$${fmt(t.lastPrice)}</strong></td>
        <td><span class="chg ${chg>=0?'up':'dn'}">${chg>=0?'+':''}${chg.toFixed(2)}%</span></td>
        <td style="color:var(--muted)">$${fmtVol(t.volume24h)}</td>
        <td style="color:var(--green)">$${fmt(t.high24h)}</td>
        <td><button class="trade-btn" onclick="event.stopPropagation();window.location='/gate-trade.html?symbol=${t.symbol}'">Trade</button></td>
      </tr>`;
    }).join('');
  }

  function renderPagination() {
    const total = filtered.length;
    const pages = Math.ceil(total / PAGE_SIZE);
    document.getElementById('pageInfo').textContent = `Showing ${Math.min((currentPage-1)*PAGE_SIZE+1,total)}–${Math.min(currentPage*PAGE_SIZE,total)} of ${total}`;
    document.getElementById('prevBtn').disabled = currentPage <= 1;
    document.getElementById('nextBtn').disabled = currentPage >= pages;
    const btns = document.getElementById('pageButtons');
    let html = '';
    for (let p = 1; p <= pages; p++) {
      html += `<button class="pg-btn ${p===currentPage?'active':''}" onclick="gotoPage(${p})">${p}</button>`;
    }
    btns.innerHTML = html;
  }

  window.gotoPage = (p) => { currentPage = p; renderTable(); renderPagination(); };
  document.getElementById('prevBtn').addEventListener('click', () => gotoPage(currentPage - 1));
  document.getElementById('nextBtn').addEventListener('click', () => gotoPage(currentPage + 1));

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentTab = btn.dataset.tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b===btn));
      applyFilters();
    });
  });

  document.getElementById('searchInput').addEventListener('input', applyFilters);

  document.querySelectorAll('thead th[data-sort]').forEach(th => {
    th.addEventListener('click', () => {
      const key = th.dataset.sort;
      if (sortKey === key) sortDir *= -1;
      else { sortKey = key; sortDir = 1; }
      document.querySelectorAll('thead th').forEach(t => t.classList.remove('sort-asc','sort-desc'));
      th.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
      applyFilters();
    });
  });

  loadUser();
  loadMarkets();
  setInterval(loadMarkets, 10000);
})();
</script>
</body>
</html>
